    # PostgreSQL配置（可选）
     driver-class-name: org.postgresql.Driver
     url: jdbc:postgresql://47.108.167.224:5432/tangtian?currentSchema=dlt
     username: tangtian
     password: tangtian

    # Oracle配置（可选）
    # driver-class-name: oracle.jdbc.OracleDriver
    # url: jdbc:oracle:thin:@localhost:1521:orcl
    # username: system
    # password: your_password
  mail:
    host: smtp.qq.com
    port: 465
    username: ${your_qq}         # 👈 替换为你的 QQ 邮箱
    password: ${your_auth_code}              # 👈 替换为 16 位授权码（非登录密码）
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
            protocols: TLSv1.2 TLSv1.3
          socketFactory:
            class: javax.net.ssl.SSLSocketFactory
            fallback: false
          timeout: 10000
          connectiontimeout: 10000
          writetimeout: 10000
          debug: false                 # 调试时改为 true 可查看 SMTP 日志

# MyBatis-Plus配置
mybatis-plus:
  type-aliases-package: top.tangtian.balofhope.dlt.analyze.entity,top.tangtian.balofhope.dlt.storage.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0